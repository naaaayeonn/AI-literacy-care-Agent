<svg xmlns="http://www.w3.org/2000/svg" width="760" height="450" viewBox="0 0 760 450" role="img" aria-labelledby="title desc">
  <title id="title">AI Literacy Care Agent multi-agent architecture insert</title>
  <desc id="desc">Compact multi-agent role architecture for inserting into a presentation demo area.</desc>

  <defs>
    <style>
      .bg { fill: #ffffff; }
      .ink { fill: #1d1d1f; }
      .muted { fill: #7a7a7a; }
      .blue { fill: #0066cc; }
      .blue-stroke { stroke: #0066cc; }
      .hairline { stroke: #e0e0e0; }
      .card { fill: #ffffff; stroke: #e0e0e0; stroke-width: 1.2; }
      .hub { fill: #1d1d1f; }
      .soft { fill: #f5f5f7; }
      .rail { fill: none; stroke: #b8c7d9; stroke-width: 2; stroke-linecap: round; }
      .flow { fill: none; stroke: #0066cc; stroke-width: 2.4; stroke-linecap: round; stroke-linejoin: round; }
      .flow-muted { fill: none; stroke: #9aa8b7; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
      .title { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Noto Sans KR", Arial, sans-serif; font-size: 25px; font-weight: 600; letter-spacing: -0.2px; }
      .subtitle { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Noto Sans KR", Arial, sans-serif; font-size: 13px; font-weight: 400; letter-spacing: -0.12px; }
      .agent-title { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Noto Sans KR", Arial, sans-serif; font-size: 16px; font-weight: 600; letter-spacing: -0.18px; }
      .agent-copy { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Noto Sans KR", Arial, sans-serif; font-size: 11.5px; font-weight: 400; letter-spacing: -0.1px; }
      .micro { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Noto Sans KR", Arial, sans-serif; font-size: 10.5px; font-weight: 600; letter-spacing: -0.1px; }
      .hub-title { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Noto Sans KR", Arial, sans-serif; font-size: 20px; font-weight: 600; letter-spacing: -0.18px; fill: #ffffff; }
      .hub-copy { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Noto Sans KR", Arial, sans-serif; font-size: 12px; font-weight: 400; letter-spacing: -0.1px; fill: #cccccc; }
    </style>

    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M1,1 L9,5 L1,9 Z" fill="#0066cc" />
    </marker>
    <marker id="arrowMuted" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M1,1 L8,4.5 L1,8 Z" fill="#9aa8b7" />
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="760" height="450" rx="0" />

  <text class="title ink" x="40" y="48">멀티 에이전트 구조</text>
  <text class="subtitle muted" x="40" y="72">역할별 모델이 하나의 읽기 세션 상태를 공유하며 측정 → 개입 → 평가를 반복</text>

  <rect class="soft hairline" x="40" y="96" width="680" height="314" rx="18" />

  <path class="rail" d="M180 250 H580" />
  <path class="rail" d="M380 142 V358" />

  <path class="flow" d="M250 174 C286 150,318 139,350 139" marker-end="url(#arrowBlue)" />
  <path class="flow" d="M510 174 C474 150,442 139,410 139" marker-end="url(#arrowBlue)" />
  <path class="flow" d="M250 326 C286 350,318 361,350 361" marker-end="url(#arrowBlue)" />
  <path class="flow" d="M510 326 C474 350,442 361,410 361" marker-end="url(#arrowBlue)" />

  <path class="flow-muted" d="M380 176 V206" marker-end="url(#arrowMuted)" />
  <path class="flow-muted" d="M380 294 V324" marker-end="url(#arrowMuted)" />
  <path class="flow-muted" d="M306 250 H336" marker-end="url(#arrowMuted)" />
  <path class="flow-muted" d="M454 250 H424" marker-end="url(#arrowMuted)" />

  <rect class="hub" x="290" y="196" width="180" height="108" rx="18" />
  <text class="hub-title" x="380" y="231" text-anchor="middle">Orchestrator</text>
  <text class="hub-copy" x="380" y="254" text-anchor="middle">ReadingSessionState</text>
  <text class="hub-copy" x="380" y="276" text-anchor="middle">상태 · 흐름 · 점수 제어</text>

  <g>
    <rect class="card" x="68" y="122" width="204" height="104" rx="18" />
    <circle class="blue" cx="96" cy="151" r="12" />
    <text class="micro" x="96" y="155" text-anchor="middle" fill="#ffffff">2</text>
    <text class="agent-title ink" x="118" y="156">Content Reducer</text>
    <text class="agent-copy muted" x="96" y="183">원문 → 쉬운문장 · 용어 · 청크</text>
    <text class="micro blue" x="96" y="204">Text Intelligence</text>
  </g>

  <g>
    <rect class="card" x="488" y="122" width="204" height="104" rx="18" />
    <circle class="blue" cx="516" cy="151" r="12" />
    <text class="micro" x="516" y="155" text-anchor="middle" fill="#ffffff">4</text>
    <text class="agent-title ink" x="538" y="156">Frontend</text>
    <text class="agent-copy muted" x="516" y="183">측정 UI · 하이라이트 · 퀴즈</text>
    <text class="micro blue" x="516" y="204">Experience Layer</text>
  </g>

  <g>
    <rect class="card" x="68" y="274" width="204" height="104" rx="18" />
    <circle class="blue" cx="96" cy="303" r="12" />
    <text class="micro" x="96" y="307" text-anchor="middle" fill="#ffffff">3</text>
    <text class="agent-title ink" x="118" y="308">Cognitive Care</text>
    <text class="agent-copy muted" x="96" y="335">읽기행동 → focus · 개입신호</text>
    <text class="micro blue" x="96" y="356">Behavior Intelligence</text>
  </g>

  <g>
    <rect class="card" x="488" y="274" width="204" height="104" rx="18" />
    <circle class="blue" cx="516" cy="303" r="12" />
    <text class="micro" x="516" y="307" text-anchor="middle" fill="#ffffff">5</text>
    <text class="agent-title ink" x="538" y="308">QA &amp; Evaluation</text>
    <text class="agent-copy muted" x="516" y="335">품질 · 환각 · 재현성 검증</text>
    <text class="micro blue" x="516" y="356">Trust Intelligence</text>
  </g>

  <g>
    <rect x="304" y="112" width="152" height="42" rx="999" fill="#ffffff" stroke="#0066cc" stroke-width="1.4" />
    <text class="micro blue" x="380" y="138" text-anchor="middle">1. Control Tower</text>
  </g>

  <g>
    <rect x="272" y="388" width="216" height="1" fill="#e0e0e0" />
    <text class="micro muted" x="380" y="398" text-anchor="middle">closed-loop literacy care</text>
  </g>
</svg>
