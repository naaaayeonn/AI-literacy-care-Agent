version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: ailiteracy_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: literacy_care
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: ailiteracy_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
